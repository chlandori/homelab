name: Deploy MaxLab

on:
  push:
    branches:
      - main
    paths:
      - "docker-compose.yml"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      force_pull:
        description: "Force pull the latest MaxLab image before starting"
        type: boolean
        default: false

jobs:
  deploy:
    name: Deploy to Homelab Host
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          tags: tag:ci

      - name: Copy docker-compose.yml to host
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "C:/homelab"

      - name: Pull latest image
        if: github.event_name == 'push' || inputs.force_pull == true
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: docker pull navigatorbbs/maxlab:latest

      - name: Restart service
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: docker compose -f C:/homelab/docker-compose.yml up -d --remove-orphans

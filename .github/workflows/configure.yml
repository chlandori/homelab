name: Configure Homelab Host

on:
  workflow_dispatch:
    inputs:
      notebook_path:
        description: "Absolute Linux path for persistent notebook storage"
        required: true
        default: "/mnt/storage/maxlab"
      jupyter_token:
        description: "JupyterLab access token (leave blank to auto-generate)"
        required: false
        default: ""

jobs:
  configure:
    name: Initial Host Configuration
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          tags: tag:ci

      - name: Create directories and write .env on host
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ${{ inputs.notebook_path }}
            
            TOKEN="${{ inputs.jupyter_token }}"
            if [ -z "$TOKEN" ]; then
              TOKEN=$(openssl rand -hex 32)
            fi
            
            mkdir -p /home/${{ secrets.SSH_USER }}/homelab
            echo "NOTEBOOK_PATH=${{ inputs.notebook_path }}" > /home/${{ secrets.SSH_USER }}/homelab/.env
            echo "JUPYTER_TOKEN=$TOKEN" >> /home/${{ secrets.SSH_USER }}/homelab/.env
            
            echo "Configuration complete."
            echo "JupyterLab will be available on port 8888 via your Tailscale IP."
            if [ -z "${{ inputs.jupyter_token }}" ]; then
              echo "Auto-generated JUPYTER_TOKEN written to /home/${{ secrets.SSH_USER }}/homelab/.env"
            fi
